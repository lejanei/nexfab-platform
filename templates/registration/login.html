{% extends "base.html" %}

{% block content %}

<div class="topbar" style="max-width:450px;margin:80px auto;">

    <h1 style="text-align:center;">
        🏭 Nexfab
    </h1>

    <p style="text-align:center;">
        Transformando dados em produtividade.
    </p>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">
            <label>Usuário</label>
            {{ form.username }}
        </div>

        <div class="form-group">
            <label>Senha</label>
            {{ form.password }}
        </div>

        <br>

        <button
            class="btn-primary"
            style="width:100%;">

            Entrar

        </button>

    </form>

</div>

{% endblock %}
