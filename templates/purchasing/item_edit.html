{% extends "base.html" %}

{% block content %}

<div class="topbar">
    <h1>Editar Item</h1>
    <p>Pedido {{ order.number }}</p>
</div>

<form method="POST" class="form-card">

    {% csrf_token %}

    <div class="form-grid">

        <div class="form-group">
            <label>Código</label>
            {{ item_form.code }}
        </div>

        <div class="form-group">
            <label>Descrição</label>
            {{ item_form.description }}
        </div>

        <div class="form-group">
            <label>Quantidade</label>
            {{ item_form.quantity }}
        </div>

        <div class="form-group">
            <label>Unidade</label>
            {{ item_form.unit }}
        </div>

        <div class="form-group">
            <label>Valor Unitário</label>
            {{ item_form.unit_price }}
        </div>

    </div>

    <div class="form-actions">
        <a href="{% url 'purchase_order_workspace' order.pk %}" class="btn-secondary">
            Cancelar
        </a>

        <button type="submit" class="btn-primary">
            Salvar Alterações
        </button>
    </div>

</form>

{% endblock %}
