{% extends "base.html" %}

{% block content %}

<div class="topbar">
    <h1>Novo Pedido</h1>
    <p>Crie uma nova solicitação de compra para aprovação.</p>
</div>

<form method="POST" class="form-card">

    {% csrf_token %}

    <div class="form-grid">

        <div class="form-group">
            <label>Fornecedor</label>
            {{ form.supplier }}
        </div>

        <div class="form-group">
            <label>Centro de custo</label>
            {{ form.cost_center }}
        </div>

        <div class="form-group">
            <label>Prioridade</label>
            {{ form.priority }}
        </div>

        <div class="form-group full">
            <label>Descrição / Observação</label>
            {{ form.description }}
        </div>

    </div>

    <div class="form-actions">
        <a href="{% url 'purchase_order_list' %}" class="btn-secondary">
            Cancelar
        </a>

        <button type="submit" class="btn-primary">
            Salvar Pedido
        </button>
    </div>

</form>

{% endblock %}
